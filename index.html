<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>التسامح</title>

<style>

body{
margin:0;
font-family:Tahoma, Arial;
direction:rtl;
text-align:center;
overflow-x:hidden;
}

/* الصفحة الأولى */

#welcome{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
padding:15px;
box-sizing:border-box;

background:url("https://i.pinimg.com/736x/13/3e/8e/133e8e80a18f6b7afddcce73a38f82da.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.logo{
width:180px;
max-width:70%;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
animation:logoAppear 2s ease forwards, breath 4s infinite ease-in-out 2s;
}

@keyframes logoAppear{
from{opacity:0; transform:scale(0.5);}
to{opacity:1; transform:scale(1);}
}

@keyframes breath{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.title{
font-size:34px;
color:red;
font-weight:bold;
margin:20px;
}

.singleImage{
width:90%;
max-width:420px;
height:160px;
object-fit:cover;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
margin-bottom:20px;
}

.start-btn{
background:#27ae60;
color:white;
border:none;
padding:14px 40px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.message{
margin-top:25px;
color:black;
font-size:16px;
width:90%;
max-width:420px;
background:rgba(255,255,255,0.75);
padding:8px;
border-radius:8px;
}

.designer{
position:absolute;
bottom:10px;
font-size:12px;
color:black;
width:100%;
text-align:center;
}

/* صفحة الجدول */

#formPage{
display:none;
padding:10px;
height:100vh;
overflow-y:auto;
box-sizing:border-box;
background:white;
}

.back-btn{
background:black;
color:white;
border:none;
padding:10px 20px;
margin-bottom:10px;
border-radius:8px;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
font-size:15px;
}

td{
border:2px solid black;
padding:10px;
text-align:right;
}

input[type=text],input[type=tel]{
width:95%;
padding:8px;
font-size:15px;
}

.options label{
display:block;
margin:4px 0;
}

.submit-btn{
background:#27ae60;
color:white;
border:none;
padding:14px;
width:100%;
font-size:18px;
margin-top:15px;
border-radius:8px;
}

.footer{
margin-top:10px;
font-size:12px;
color:black;
padding-bottom:10px;
}

/* مربعات الكود */

.codeBox{
width:40px;
height:40px;
text-align:center;
font-size:18px;
margin:3px;
border:2px solid black;
}

/* رسالة النجاح */

#successMessage{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px 30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
font-size:18px;
}

</style>
</head>

<body>

<div id="welcome">

<img src="https://i.pinimg.com/736x/84/df/77/84df77980c4741b052553a23a2aa3057.jpg" class="logo">

<div class="title">التسامح</div>

<img class="singleImage" src="https://i.pinimg.com/736x/e3/96/65/e39665d40d1630a4e9e05bcc4fa110b0.jpg">

<button class="start-btn" onclick="openForm()">ابدأ</button>

<div class="message">
مرحبا بك في متجر التسامح للصيانة والخدمات الالكترونية بجودة وسرعة عالية.
</div>

<div class="designer">
Designed by: Abdalla Hashim Merghani
</div>

</div>


<div id="formPage">

<button class="back-btn" onclick="goBack()">رجوع</button>

<table>

<tr>
<td>الاسم</td>
<td><input type="text" id="name" oninput="generateCode()"></td>
</tr>

<tr>
<td>نوع الهاتف</td>
<td class="options">

<label><input type="radio" name="phone" value="Samsung" onclick="showPhoneModel('Samsung');generateCode()"> Samsung</label>
<label><input type="radio" name="phone" value="Huawei" onclick="showPhoneModel('Huawei');generateCode()"> Huawei</label>
<label><input type="radio" name="phone" value="Xiaomi" onclick="showPhoneModel('Xiaomi');generateCode()"> Xiaomi</label>
<label><input type="radio" name="phone" value="Honor" onclick="showPhoneModel('Honor');generateCode()"> Honor</label>
<label><input type="radio" name="phone" value="Tecno" onclick="showPhoneModel('Tecno');generateCode()"> Tecno</label>
<label><input type="radio" name="phone" value="Apple" onclick="showPhoneModel('Apple');generateCode()"> Apple</label>
<label><input type="radio" name="phone" value="Realme" onclick="showPhoneModel('Realme');generateCode()"> Realme</label>
<label><input type="radio" name="phone" value="Vivo" onclick="showPhoneModel('Vivo');generateCode()"> Vivo</label>

<label>
<input type="radio" name="phone" value="Other" onclick="showOtherPhone();generateCode()"> جهاز اخر
</label>

<div id="phoneModelBox" style="display:none;">
<input type="text" id="phoneModel" placeholder="">
</div>

<div id="otherPhoneBox" style="display:none;">
<input type="text" id="otherPhone" placeholder="اكتب نوع الهاتف" oninput="generateCode()">
</div>

</td>
</tr>

<tr>
<td>مشكلة الهاتف</td>

<td class="options">

<label><input type="radio" name="problem" value="شاشة" onclick="hideOtherProblem();generateCode()"> شاشة</label>
<label><input type="radio" name="problem" value="بطارية" onclick="hideOtherProblem();generateCode()"> بطارية</label>
<label><input type="radio" name="problem" value="سوكت" onclick="hideOtherProblem();generateCode()"> سوكت</label>
<label><input type="radio" name="problem" value="فرمتة" onclick="hideOtherProblem();generateCode()"> فرمتة</label>
<label><input type="radio" name="problem" value="فحص" onclick="hideOtherProblem();generateCode()"> فحص</label>

<label>
<input type="radio" name="problem" value="اخرى" onclick="showOtherProblem();generateCode()"> اخرى
</label>

<div id="otherProblemBox" style="display:none;">
<input type="text" id="otherProblem" placeholder="اكتب المشكلة" oninput="generateCode()">
</div>

</td>
</tr>

<tr>
<td>رقم الهاتف</td>
<td><input type="tel" id="phoneNumber" oninput="generateCode()"></td>
</tr>

<tr>
<td>الكود الخاص</td>
<td>
<input class="codeBox" id="c1" readonly>
<input class="codeBox" id="c2" readonly>
<input class="codeBox" id="c3" readonly>
</td>
</tr>

</table>

<button class="submit-btn" onclick="sendTelegram()">وضع طلب</button>

<div class="footer">
للاستفسار: 0100143447
</div>

</div>

<div id="successMessage"></div>

<script>

let privateCode="";

function openForm(){
document.getElementById("welcome").style.display="none";
document.getElementById("formPage").style.display="block";
}

function goBack(){
document.getElementById("formPage").style.display="none";
document.getElementById("welcome").style.display="flex";
}

/* اصلاح مشكلة نوع الهاتف */

function showPhoneModel(name){
document.getElementById("phoneModelBox").style.display="block";
document.getElementById("otherPhoneBox").style.display="none";
document.getElementById("phoneModel").placeholder=name;
}

function showOtherPhone(){
document.getElementById("phoneModelBox").style.display="none";
document.getElementById("otherPhoneBox").style.display="block";
}

function showOtherProblem(){
document.getElementById("otherProblemBox").style.display="block";
}

function hideOtherProblem(){
document.getElementById("otherProblemBox").style.display="none";
}

function generateCode(){

let name=document.getElementById("name").value;
let phoneNumber=document.getElementById("phoneNumber").value;
let phone=document.querySelector('input[name="phone"]:checked');
let problem=document.querySelector('input[name="problem"]:checked');

if(name && phoneNumber && phone && problem){

let n1=Math.floor(Math.random()*10)+1;
let n2=Math.floor(Math.random()*10)+1;
let n3=Math.floor(Math.random()*10)+1;

document.getElementById("c1").value=n1;
document.getElementById("c2").value=n2;
document.getElementById("c3").value=n3;

privateCode=""+n1+n2+n3;

}

}

function sendTelegram(){

let name=document.getElementById("name").value;
let phoneNumber=document.getElementById("phoneNumber").value;
let phoneModel=document.getElementById("phoneModel").value;
let otherProblem=document.getElementById("otherProblem").value;
let otherPhone=document.getElementById("otherPhone").value;

let phone=document.querySelector('input[name="phone"]:checked');
let problem=document.querySelector('input[name="problem"]:checked');

phone=phone?phone.value:"";
problem=problem?problem.value:"";

if(phone=="Other"){
phone="جهاز اخر: "+otherPhone;
}

if(problem=="اخرى"){
problem="اخرى: "+otherProblem;
}

let text=
"طلب صيانة جديد %0A"+
"الاسم: "+name+"%0A"+
"نوع الهاتف: "+phone+"%0A"+
"موديل الهاتف: "+phoneModel+"%0A"+
"المشكلة: "+problem+"%0A"+
"رقم الهاتف: "+phoneNumber+"%0A"+
"الكود الخاص: "+privateCode;

/* البوت الاول */

let token1="8620736182:AAFwcp0fsNH7WSiPm2AVDh3qWrsCf_m4ZTA";
let chat_id1="8331036866";

fetch("https://api.telegram.org/bot"+token1+"/sendMessage?chat_id="+chat_id1+"&text="+text);

/* البوت الثاني */

let token2="8735950920:AAFIiYgDxL541JNKQXtcQk4aDYDAJrPptjU";
let chat_id2="8285024067";

fetch("https://api.telegram.org/bot"+token2+"/sendMessage?chat_id="+chat_id2+"&text="+text);

document.getElementById("successMessage").style.display="block";
document.getElementById("successMessage").innerHTML=
"تم ارسال الطلب بنجاح<br><br>الكود الخاص "+privateCode;

setTimeout(()=>{
document.getElementById("successMessage").style.display="none";
},4000);

}

</script>

</body>
</html>
